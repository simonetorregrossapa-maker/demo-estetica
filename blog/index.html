<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<script src="../config.js"></script><script src="../components.js"></script><script src="../app.js"></script>
</head>
<body>
<section class="bg-crema-2" style="padding-bottom:2.5rem">
  <div class="container">
    <div class="breadcrumb"><a href="../index.html">Home</a> › Blog</div>
    <div class="eyebrow">Consigli di bellezza</div>
    <h1 class="serif">Il blog di <span class="italic">Bellezza Studio</span></h1>
    <p class="lead" style="max-width:56ch;margin-top:.8rem">Consigli pratici su skincare, benessere e cura di sé, dalle nostre estetiste.</p>
  </div>
</section>

<section class="bg-crema"><div class="container grid-3" id="postBox"></div></section>

<section class="bg-salvia center"><div class="container"><h2 class="serif">Mettiamo in pratica?</h2><p class="lead mt1" style="opacity:.92">Prenota il trattamento giusto per te.</p><div class="mt2"><a class="btn btn-light" href="../prenota.html">✦ Prenota ora</a></div></div></section>

<script>
const POSTS = [
  ["primo-trattamento-viso.html","✺","Come prepararti al primo trattamento viso","Cosa fare (e non fare) nei giorni prima, cosa aspettarti e come far durare i risultati."],
  ["cellulite-cosa-funziona.html","❋","Cellulite: cosa funziona davvero","Una guida onesta tra miti e realtà, con i trattamenti più efficaci e le abitudini che aiutano."],
  ["manicure-semipermanente-guida.html","✿","Manicure semipermanente: la guida","Durata, vantaggi, come prendertene cura e come rimuoverla senza rovinare le unghie."],
];
SITEUI.mount({ active:"blog/index.html", base:"../", title:"Blog — Consigli di bellezza",
  description:"Consigli di skincare, benessere e cura di sé dalle estetiste di Bellezza Studio a Palermo.",
  onReady(){
    document.getElementById("postBox").innerHTML = POSTS.map((p,i)=>`
      <a class="card reveal d${(i%3)+1}" href="${p[0]}" style="text-decoration:none">
        <div class="g-item" style="aspect-ratio:16/9;margin-bottom:1rem"><div class="ph">${p[1]}</div></div>
        <span class="pill">Consigli</span>
        <h3 class="serif" style="margin:.6rem 0 .4rem">${p[2]}</h3>
        <p class="muted">${p[3]}</p>
        <p class="price small mt1">Leggi →</p>
      </a>`).join("");
  }
});
</script>
</body>
</html>
