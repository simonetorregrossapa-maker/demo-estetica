<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<script src="config.js"></script><script src="components.js"></script><script src="app.js"></script>
</head>
<body>
<section class="bg-crema-2" style="padding-bottom:2.5rem">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Home</a> › FAQ</div>
    <div class="eyebrow">Domande frequenti</div>
    <h1 class="serif">Tutto quello che <span class="italic">vuoi sapere</span></h1>
  </div>
</section>

<section class="bg-crema"><div class="container" style="max-width:780px" id="faqBox"></div></section>

<section class="bg-salvia center"><div class="container"><h2 class="serif">Hai altre domande?</h2><p class="lead mt1" style="opacity:.92">Siamo a disposizione: scrivici o chiamaci.</p><div class="mt2"><a class="btn btn-light" href="contatti.html">Contattaci</a></div></div></section>

<script>
const FAQ = [
  ["Come preparo la pelle prima di un trattamento viso?","Evita esfolianti aggressivi nei due giorni precedenti e presentati struccata se possibile. Penseremo noi a detergere e preparare la pelle. Segnalaci sempre allergie o prodotti che stai usando."],
  ["Ci sono controindicazioni ai trattamenti?","Alcuni trattamenti sono sconsigliati in gravidanza, in presenza di lesioni cutanee, dermatiti attive o particolari patologie. Durante la consulenza iniziale valutiamo insieme la soluzione più adatta e sicura per te."],
  ["Quanto dura un trattamento?","Dipende dal trattamento: dai 20 minuti dell'epilazione viso ai 90 minuti del percorso SPA. La durata è indicata accanto a ogni voce del listino e nella schermata di prenotazione."],
  ["Posso scegliere l'estetista?","Sì. In fase di prenotazione puoi selezionare l'operatrice che preferisci, in base alla disponibilità."],
  ["Come funziona la disdetta?","Puoi disdire o spostare l'appuntamento gratuitamente fino a 24 ore prima, tramite il link che ricevi nell'email di conferma o chiamandoci. Oltre questo limite potrebbe essere applicato un addebito."],
  ["Devo pagare un acconto per prenotare?","No, la prenotazione online è gratuita e non richiede pagamenti anticipati. Per alcuni percorsi o trattamenti lunghi potremmo richiedere un piccolo acconto a conferma: te lo indicheremo chiaramente."],
  ["I prodotti sono adatti a pelli sensibili?","Lavoriamo con linee professionali dermatologicamente testate e scegliamo i prodotti in base al tuo tipo di pelle. Per pelli molto reattive eseguiamo sempre un test preliminare."],
  ["Fate buoni regalo?","Sì! Trovi i buoni regalo nella pagina Pacchetti: sono personalizzabili nell'importo e validi su tutti i trattamenti."],
];
SITEUI.mount({
  active:"faq.html", title:"FAQ — Domande frequenti",
  description:"Risposte alle domande più frequenti: preparazione ai trattamenti, controindicazioni, disdette, acconti e buoni regalo.",
  schema:[{ "@context":"https://schema.org","@type":"FAQPage",
    mainEntity: FAQ.map(([q,a])=>({ "@type":"Question", name:q, acceptedAnswer:{ "@type":"Answer", text:a } })) }],
  onReady(){
    document.getElementById("faqBox").innerHTML = FAQ.map(([q,a])=>`
      <div class="faq-item reveal">
        <button class="faq-q" onclick="this.parentElement.classList.toggle('open')">${q}<span class="pm">+</span></button>
        <div class="faq-a"><p>${a}</p></div>
      </div>`).join("");
    // apre/chiude regolando max-height per la transizione
    document.querySelectorAll(".faq-q").forEach(b=>b.addEventListener("click",()=>{
      const a=b.nextElementSibling; a.style.maxHeight = b.parentElement.classList.contains("open") ? a.scrollHeight+"px" : "0";
    }));
  }
});
</script>
</body>
</html>
