<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<script src="config.js"></script><script src="components.js"></script><script src="app.js"></script>
</head>
<body>
<section class="bg-crema">
  <div class="container prose">
    <div class="breadcrumb"><a href="index.html">Home</a> › Cookie Policy</div>
    <h1 class="serif">Cookie Policy</h1>
    <div id="body"></div>
  </div>
</section>
<script>
SITEUI.mount({ active:null, title:"Cookie Policy", description:"Informativa sui cookie di Bellezza Studio.",
  onReady(){
    document.getElementById("body").innerHTML=`
      <p>Questo sito utilizza cookie per garantirne il funzionamento e, previo consenso, per servizi di terze parti.</p>
      <h2 class="serif">Cookie tecnici (necessari)</h2>
      <p>Indispensabili per la navigazione e per memorizzare le tue preferenze (es. la scelta sul banner cookie, salvata in <code>localStorage</code>). Non richiedono consenso.</p>
      <h2 class="serif">Cookie di terze parti</h2>
      <ul>
        <li><strong>Google Maps</strong> — mappa nella pagina Contatti.</li>
        <li><strong>EmailJS / Supabase</strong> — gestione delle prenotazioni e delle email di conferma.</li>
        <li><strong>Widget recensioni Google</strong> — se attivato in pagina Recensioni.</li>
      </ul>
      <p>Questi servizi possono installare cookie propri; vengono caricati solo dopo il tuo consenso tramite il banner.</p>
      <h2 class="serif">Gestione delle preferenze</h2>
      <p>Puoi modificare o revocare il consenso cancellando i dati del sito dal tuo browser. Puoi inoltre bloccare i cookie dalle impostazioni del browser.</p>
      <button class="btn btn-outline" onclick="localStorage.removeItem('cookie_ok');location.reload()">Ripristina scelta cookie</button>
      <p class="muted small mt2">Documento fac-simile: adegua l'elenco ai servizi realmente attivi e fallo validare prima della pubblicazione.</p>`;
  }
});
</script>
</body>
</html>
