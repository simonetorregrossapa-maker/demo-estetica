<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Dashboard Recensioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script><script src="components.js"></script><script src="app.js"></script>
</head>
<body>
<!-- DASHBOARD RECENSIONI (area gestione del titolare).
     Mostra: richieste inviate, tasso risposta, valutazioni, recensioni pubbliche,
     feedback privati. + Generatore QR/link per la raccolta in sede. -->
<section class="bg-crema-2" style="padding-bottom:1.5rem">
  <div class="container">
    <div class="eyebrow">Area gestione · solo titolare</div>
    <h1 class="serif">Dashboard <span class="italic">recensioni</span></h1>
    <p class="muted" id="modeNote"></p>
  </div>
</section>

<section class="bg-crema" style="padding-top:1.5rem">
  <div class="container">
    <div class="grid-3" id="stats"></div>

    <div class="grid-2 mt2" style="align-items:start;margin-top:2.5rem">
      <!-- Feedback privati -->
      <div>
        <h3 class="serif mb1">Feedback privati ricevuti</h3>
        <div id="fbList"></div>
      </div>
      <!-- QR / link in sede -->
      <div>
        <h3 class="serif mb1">Raccogli recensioni in sede</h3>
        <div class="card center">
          <p class="muted small mb1">Esponi questo QR alla reception: la cliente lo inquadra, passa dal filtro intelligente e — se soddisfatta — va su Google.</p>
          <img id="qr" alt="QR recensioni" width="180" height="180" style="margin:0 auto;background:#fff;padding:8px;border-radius:8px"/>
          <div class="link-box card" style="margin-top:1rem;display:flex;gap:.6rem;align-items:center;background:var(--crema-2)">
            <span id="shortLink" class="small" style="flex:1;word-break:break-all;color:var(--rosa-dark)"></span>
            <button class="btn btn-primary" style="padding:.4rem .8rem;font-size:.6rem" id="copyLink">Copia</button>
          </div>
          <a class="btn btn-outline mt1" id="dlQr" download="qr-recensioni.png">Scarica QR</a>
        </div>
      </div>
    </div>

  </div>
</section>

<script>
SITEUI.mount({ active:null, hideFab:true,
  async onReady(){
    const reviewUrl = `${location.origin}${location.pathname.replace(/[^/]*$/,'')}recensione.html`;
    // QR + link in sede
    document.getElementById("qr").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(reviewUrl)}`;
    document.getElementById("dlQr").href = document.getElementById("qr").src;
    document.getElementById("shortLink").textContent = reviewUrl;
    document.getElementById("copyLink").onclick = ()=>{ navigator.clipboard.writeText(reviewUrl); SITEAPP.toast("Link copiato","ok"); };

    const note = document.getElementById("modeNote");
    const statsBox = document.getElementById("stats"), fbBox = document.getElementById("fbList");

    // Connessione (la libreria carica in async)
    if (SITEAPP.hasSupabase && !window.supabase) {
      await new Promise(res=>{ let n=0; const iv=setInterval(()=>{ if(window.supabase||n++>40){clearInterval(iv);res();} },50); });
    }
    SITEAPP.initSupabase();
    const sb = SITEAPP.getClient();
    let session=null;
    if (sb) { try { session=(await sb.auth.getSession()).data.session; } catch(e){} }

    // Area riservata: serve il login (condiviso col pannello gestione)
    if (sb && !session) {
      note.textContent = "";
      statsBox.innerHTML = "";
      fbBox.innerHTML = `<p class="muted">Accedi dal <a href="gestione.html">pannello gestione</a> per vedere recensioni e feedback.</p>`;
      return;
    }

    let stats, feedbacks;
    if (sb) {
      note.textContent = "";
      const { data:pre } = await sb.from("prenotazioni").select("recensione_inviata,stato");
      const { data:fb } = await sb.from("feedback").select("*").order("created_at",{ascending:false});
      const inviate=(pre||[]).filter(p=>p.recensione_inviata).length;
      const completate=(pre||[]).filter(p=>p.stato!=="cancellata").length;
      feedbacks=fb||[];
      stats=[["Richieste recensione inviate",inviate],["Appuntamenti",completate],["Feedback privati",feedbacks.length]];
    } else {
      note.textContent = "Anteprima dimostrativa — dati di esempio.";
      feedbacks=[{testo:"Tempo di attesa un po' lungo all'arrivo, per il resto bene.",created_at:"2026-06-14"},{testo:"Avrei gradito più spiegazioni sul trattamento.",created_at:"2026-06-10"}];
      stats=[["Richieste inviate","—"],["Appuntamenti","—"],["Feedback privati",feedbacks.length]];
    }
    statsBox.innerHTML = stats.map(([l,v])=>`<div class="card center"><div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div></div>`).join("");
    fbBox.innerHTML = feedbacks.length
      ? feedbacks.map(f=>`<div class="card" style="margin-bottom:.8rem"><p class="small">"${f.testo}"</p><p class="muted small mt1">${(f.created_at||"").slice(0,10)}${f.contatto?" · "+f.contatto:""}</p></div>`).join("")
      : `<p class="muted">Nessun feedback privato ricevuto. Ottimo segno.</p>`;
  }
});
</script>
</body>
</html>
