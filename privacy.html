<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<script src="config.js"></script><script src="components.js"></script><script src="app.js"></script>
</head>
<body>
<section class="bg-crema">
  <div class="container prose">
    <div class="breadcrumb"><a href="index.html">Home</a> › Privacy Policy</div>
    <h1 class="serif">Privacy Policy</h1>
    <p class="muted">Informativa ai sensi degli artt. 13-14 del Regolamento UE 2016/679 (GDPR).</p>
    <div id="body"></div>
  </div>
</section>
<script>
SITEUI.mount({ active:null, title:"Privacy Policy",
  description:"Informativa privacy GDPR di Bellezza Studio.",
  onReady(){
    const S=SITE;
    document.getElementById("body").innerHTML=`
      <h2 class="serif">Titolare del trattamento</h2>
      <p>${S.legal.titolare}, ${SITEUI.indirizzoFull}. P.IVA ${S.legal.pIva}. Email: <a href="mailto:${S.legal.emailPrivacy}">${S.legal.emailPrivacy}</a>.</p>
      <h2 class="serif">Dati raccolti e finalità</h2>
      <p>Raccogliamo i dati che ci fornisci tramite il modulo di prenotazione e di contatto (nome, email, telefono, eventuali note). Li trattiamo per:</p>
      <ul>
        <li>gestire la tua prenotazione e fornirti conferme e promemoria;</li>
        <li>rispondere alle tue richieste di contatto;</li>
        <li>previo consenso, inviarti una richiesta di recensione dopo il trattamento.</li>
      </ul>
      <h2 class="serif">Base giuridica</h2>
      <p>Esecuzione di un servizio da te richiesto (art. 6.1.b GDPR) e, per le comunicazioni di recensione/marketing, il tuo consenso esplicito (art. 6.1.a), revocabile in qualsiasi momento.</p>
      <h2 class="serif">Conservazione</h2>
      <p>Conserviamo i dati per il tempo necessario alle finalità indicate e agli obblighi di legge, dopodiché vengono cancellati o anonimizzati.</p>
      <h2 class="serif">Comunicazione a terzi</h2>
      <p>I dati possono essere trattati da fornitori che ci supportano (es. piattaforma di prenotazione, servizio di invio email), nominati responsabili del trattamento e situati nell'UE o in Paesi con garanzie adeguate. Non vendiamo i tuoi dati.</p>
      <h2 class="serif">I tuoi diritti</h2>
      <p>Hai diritto di accesso, rettifica, cancellazione, limitazione, portabilità e opposizione, oltre a revocare il consenso e proporre reclamo al Garante per la protezione dei dati personali. Per esercitarli scrivi a <a href="mailto:${S.legal.emailPrivacy}">${S.legal.emailPrivacy}</a>.</p>
      <p class="muted small mt2">Ultimo aggiornamento: ${new Date().toLocaleDateString("it-IT")}. Documento fac-simile da far validare a un consulente prima della messa online.</p>`;
  }
});
</script>
</body>
</html>
